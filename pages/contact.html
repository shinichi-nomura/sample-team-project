<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact-page</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header class="container">
        <div class="header-logo">
            <a href="../index.html">
                <h1><img src="logo.png" alt="ロゴ画像"></h1>
                <h2>ときめき神社♡LOVE</h2>
            </a>
        </div>
        <div class="menu-wrapper">
            <button class="hamburger-menu" aria-label="メニューを開く">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
            <nav class="nav-menu">
                <ul class="nav-list">
                    <li class="nav-1"><a href="first.html">初めての方へ</a></li>
                    <li class="nav-2"><a href="event.html">イベント</a></li>
                    <li class="nav-3"><a href="event.html">近況報告</a></li>
                    <li class="nav-4"><a href="#book">著書</a></li>
                    <li class="nav-5"><a href="#about">個性心理學研究所湘南支所</a></li>
                    <li class="nav-6 active"><a href="contact.html">お問い合わせ<span>お仕事依頼</span></a></li>
                </ul>
            </nav>
        </div>
    </header>
    <img src="../images/Frame 138.png" width="720" height="1640">
    <section class="contact-form"
        <form id="contactForm" class="contact">
            <div class="contact-title">
                <h2>お問い合わせ<br>お仕事依頼</h2>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <div class="field">
                        <div class="label-row">
                            <label for="contact-lastName">苗字</label>
                            <span class="required">必須</span>
                        </div>
                        <input type="text" id="lastName" name="name" required>
                    </div>
                </div>
                <div class="form-group">
                    <div class="field">
                        <div class="label-row">
                            <label for="contact-firstName">お名前</label>
                            <span class="required">必須</span>
                        </div>
                        <input type="text" id="firstName" name="name" required>
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <div class="field">
                        <div class="label-row">
                            <label for="contact-lastName">みょうじ</label>
                            <span class="required">必須</span>
                        </div>
                        <input type="text" id="lastName-check" name="name" required>
                    </div>
                </div>
                <div class="form-group">
                    <div class="field">
                        <div class="label-row">
                            <label for="contact-firstName">おなまえ</label>
                            <span class="required">必須</span>
                        </div>
                        <input type="text" id="firstName-check" name="name" required>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <div class="label-row">
                    <label for="contact-email">メールアドレス</label>
                    <span class="required">必須</span>
                </div>
                <input type="email" id="contact-email" name="email" required>
            </div>
            <div class="form-group">
                <div class="label-row">
                    <label for="email-check">メールアドレス(確認)</label>
                    <span class="required">必須</span>
                </div>
                <input type="email" id="email-check" name="email" required>
            </div>
            <div class="form-row">
                <div class="field">
                    <div class="form-group">
                        <label for="contact-tell">電話番号</label>
                        <input type="text" id="contact-tell" name="phone">
                    </div>
                </div>
                <div class="form-group">
                    <div class="field">
                        <label for="contact-tell">携帯電話番号</label>
                        <input type="text" id="contact-phone" name="phone">
                    </div>
                </div>

            </div>
            <div class="form-group">
                <label for="address">住所</label>
                <img src="post" alt="郵便番号">
                <input type="text" id="contact-address" name="postalCode">
                <input type="text" id="address-search" name="addressSearch">
                <label for="prefecture">都道府県</label>
                <select id="prefecture" name="prefecture"></select>
                <label for="municipality">市区町村番地</label>
                <input type="text" id="municipality" name="municipality">
                <label for="building">建物・部屋名</label>
                <input type="text" id="building" name="building">
            </div>
            <div class="form-group">
                <div class="label-row">
                    <label for="contact-details">内容</label>
                    <span class="required">必須</span>
                </div>
                <textarea id="contact-details" name="details" required></textarea>
            </div>
            <div class="decision-button">
                <button type="submit" class="decision">決定</button>
            </div>
        </form>
    </section>
    <script src="../js/main.js"></script>
</body>

</html>
